<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Charts — MANTUL FLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030712;
  --surface:rgba(15,23,42,0.8);
  --border:rgba(255,255,255,0.06);
  --border-active:rgba(56,189,248,0.3);
  --text:#e2e8f0;
  --muted:#64748b;
  --blue:#38bdf8;
  --green:#10b981;
  --red:#f87171;
  --mono:'Space Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.header{background:rgba(3,7,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;background:linear-gradient(135deg,var(--blue),#818cf8);-webkit-background-clip:text;background-clip:text;color:transparent}
.back-btn{padding:6px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border-active);border-radius:8px;color:var(--blue);font-size:12px;font-family:var(--mono);cursor:pointer;text-decoration:none;display:inline-block;transition:.2s}
.back-btn:hover{background:rgba(56,189,248,0.1)}
.main{padding:24px;max-width:1600px;margin:0 auto}
h2{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}

/* Symbol selector tabs */
.sym-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sym-tab{padding:6px 14px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;font-family:var(--mono);cursor:pointer;transition:.2s}
.sym-tab.active{background:rgba(56,189,248,0.12);border-color:var(--border-active);color:var(--blue)}
.sym-tab:hover{border-color:var(--border-active);color:var(--text)}

/* Interval tabs */
.interval-row{display:flex;gap:6px;margin-bottom:12px}
.int-btn{padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:10px;font-family:var(--mono);cursor:pointer;transition:.2s}
.int-btn.active{background:rgba(56,189,248,0.1);border-color:var(--border-active);color:var(--blue)}

/* Single chart view */
.chart-hero{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:24px}
.chart-hero-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.chart-hero-title{font-family:var(--mono);font-size:16px;font-weight:700}
.chart-hero-price{font-family:var(--mono);font-size:24px;font-weight:700}
.chart-hero-chg{font-family:var(--mono);font-size:13px;margin-left:10px}
.chart-hero-chg.up{color:var(--green)}.chart-hero-chg.dn{color:var(--red)}
.tradingview-widget-container{height:500px}

/* Grid of all charts */
.all-charts-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:28px 0 16px}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:16px}
@media(max-width:600px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:.3s}
.chart-card:hover{border-color:var(--border-active)}
.chart-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.chart-card-title{font-family:var(--mono);font-size:12px;font-weight:700}
.chart-card-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
.chart-card-price{font-family:var(--mono);font-size:14px;font-weight:700}
.chart-card-chg{font-family:var(--mono);font-size:11px;margin-left:8px}
.chart-card-chg.up{color:var(--green)}.chart-card-chg.dn{color:var(--red)}
.chart-card-body{height:280px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ MANTUL FLOW — LIVE CHARTS</div>
  <a class="back-btn" href="/dashboard.html">← Back to Dashboard</a>
</div>

<div class="main">
  <h2>Select Pair</h2>

  <!-- Symbol tabs -->
  <div class="sym-tabs" id="symTabs"></div>

  <!-- Interval selector -->
  <div class="interval-row" id="intervalRow">
    <button class="int-btn" onclick="setInterval_('1')">1M</button>
    <button class="int-btn" onclick="setInterval_('5')">5M</button>
    <button class="int-btn" onclick="setInterval_('15')">15M</button>
    <button class="int-btn active" onclick="setInterval_('60')">1H</button>
    <button class="int-btn" onclick="setInterval_('240')">4H</button>
    <button class="int-btn" onclick="setInterval_('D')">1D</button>
    <button class="int-btn" onclick="setInterval_('W')">1W</button>
  </div>

  <!-- Hero chart for selected pair -->
  <div class="chart-hero">
    <div class="chart-hero-header">
      <div>
        <span class="chart-hero-title" id="heroTitle">EUR/USD</span>
        <span class="chart-hero-chg up" id="heroChg">—</span>
      </div>
      <span class="chart-hero-price" id="heroPrice">—</span>
    </div>
    <div class="tradingview-widget-container" id="heroChartContainer"></div>
  </div>

  <!-- All 11 charts -->
  <div class="all-charts-title">All 11 Pairs — Live</div>
  <div class="charts-grid" id="chartsGrid"></div>
</div>

<!-- TradingView library -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const PAIRS = [
  { label:"EUR/USD",  tv:"FX:EURUSD",   deriv:"frxEURUSD",  cat:"Forex" },
  { label:"GBP/USD",  tv:"FX:GBPUSD",   deriv:"frxGBPUSD",  cat:"Forex" },
  { label:"USD/JPY",  tv:"FX:USDJPY",   deriv:"frxUSDJPY",  cat:"Forex" },
  { label:"USD/CHF",  tv:"FX:USDCHF",   deriv:"frxUSDCHF",  cat:"Forex" },
  { label:"AUD/USD",  tv:"FX:AUDUSD",   deriv:"frxAUDUSD",  cat:"Forex" },
  { label:"USD/CAD",  tv:"FX:USDCAD",   deriv:"frxUSDCAD",  cat:"Forex" },
  { label:"NZD/USD",  tv:"FX:NZDUSD",   deriv:"frxNZDUSD",  cat:"Forex" },
  { label:"XAU/USD",  tv:"TVC:GOLD",    deriv:"frxXAUUSD",  cat:"Metals" },
  { label:"XAG/USD",  tv:"TVC:SILVER",  deriv:"frxXAGUSD",  cat:"Metals" },
  { label:"BTC/USD",  tv:"BINANCE:BTCUSDT", deriv:"cryBTCUSD", cat:"Crypto" },
  { label:"ETH/USD",  tv:"BINANCE:ETHUSDT", deriv:"cryETHUSD", cat:"Crypto" },
];

let selectedIdx = 0;
let selectedInterval = "60";

// Check hash for direct link
const hash = location.hash.slice(1);
if(hash){
  const idx = PAIRS.findIndex(p=>p.deriv===hash);
  if(idx>=0) selectedIdx=idx;
}

// ── BUILD SYMBOL TABS ──
function buildTabs(){
  const el = document.getElementById("symTabs");
  el.innerHTML = PAIRS.map((p,i)=>`
    <button class="sym-tab ${i===selectedIdx?'active':''}" onclick="selectPair(${i})">
      ${p.label}
    </button>`).join("");
}

function selectPair(idx){
  selectedIdx = idx;
  buildTabs();
  buildHeroChart();
  document.getElementById("heroTitle").textContent = PAIRS[idx].label;
}

function setInterval_(iv){
  selectedInterval = iv;
  document.querySelectorAll(".int-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  buildHeroChart();
}

// ── HERO CHART ──
let heroWidget = null;
function buildHeroChart(){
  const pair = PAIRS[selectedIdx];
  const container = document.getElementById("heroChartContainer");
  container.innerHTML = "";
  container.style.height = "500px";
  const tvDiv = document.createElement("div");
  tvDiv.id = "tv_hero";
  tvDiv.style.height = "100%";
  container.appendChild(tvDiv);

  heroWidget = new TradingView.widget({
    width:           "100%",
    height:          500,
    symbol:          pair.tv,
    interval:        selectedInterval,
    timezone:        "Etc/UTC",
    theme:           "dark",
    style:           "1",
    locale:          "en",
    toolbar_bg:      "#030712",
    enable_publishing: false,
    hide_top_toolbar:  false,
    hide_legend:       false,
    save_image:        false,
    container_id:      "tv_hero",
    overrides:{
      "paneProperties.background":            "#030712",
      "paneProperties.backgroundType":        "solid",
      "paneProperties.vertGridProperties.color":"rgba(255,255,255,0.03)",
      "paneProperties.horzGridProperties.color":"rgba(255,255,255,0.03)",
      "scalesProperties.textColor":           "#64748b",
    },
    studies:["RSI@tv-basicstudies","MACD@tv-basicstudies"],
  });
}

// ── ALL 11 MINI CHARTS ──
function buildAllCharts(){
  const grid = document.getElementById("chartsGrid");
  grid.innerHTML = "";

  PAIRS.forEach((pair,i)=>{
    const card = document.createElement("div");
    card.className = "chart-card";
    card.innerHTML = `
      <div class="chart-card-header">
        <div>
          <span class="chart-card-title">${pair.label}</span>
          <span class="chart-card-meta" style="margin-left:8px">${pair.cat}</span>
        </div>
        <div>
          <span class="chart-card-price" id="miniPrice_${i}">—</span>
          <span class="chart-card-chg up" id="miniChg_${i}">—</span>
        </div>
      </div>
      <div class="chart-card-body" id="miniChart_${i}"></div>`;
    grid.appendChild(card);

    new TradingView.widget({
      width:            "100%",
      height:           280,
      symbol:           pair.tv,
      interval:         "60",
      timezone:         "Etc/UTC",
      theme:            "dark",
      style:            "1",
      locale:           "en",
      toolbar_bg:       "#030712",
      enable_publishing: false,
      hide_top_toolbar:  true,
      hide_legend:       true,
      hide_side_toolbar: true,
      save_image:        false,
      container_id:      `miniChart_${i}`,
      overrides:{
        "paneProperties.background":             "#030712",
        "paneProperties.backgroundType":         "solid",
        "paneProperties.vertGridProperties.color":"rgba(255,255,255,0.02)",
        "paneProperties.horzGridProperties.color":"rgba(255,255,255,0.02)",
        "scalesProperties.textColor":            "#64748b",
      },
    });
  });
}

// ── LIVE PRICES via Deriv WS ──
const prices = {};
const prevPrices = {};

function connectPriceWs(){
  const ws = new WebSocket("wss://ws.binaryws.com/websockets/v3?app_id=1089");
  ws.onopen = ()=>{
    PAIRS.forEach((p,i)=>{
      ws.send(JSON.stringify({ ticks:p.deriv, subscribe:1, req_id:i+1 }));
    });
  };
  ws.onmessage = e=>{
    const d = JSON.parse(e.data);
    if(d.msg_type==="tick"&&d.tick){
      const sym   = d.tick.symbol;
      const price = parseFloat(d.tick.quote);
      const idx   = PAIRS.findIndex(p=>p.deriv===sym);
      if(idx<0) return;
      prevPrices[sym] = prices[sym]||price;
      prices[sym]     = price;

      const dp   = sym.includes("JPY")||sym.includes("XAU")||sym.includes("XAG")||sym.includes("BTC")||sym.includes("ETH") ? 2 : 5;
      const up   = price >= prevPrices[sym];
      const chg  = prevPrices[sym] ? ((price-prevPrices[sym])/prevPrices[sym]*100).toFixed(3) : "0.000";

      // Update mini chart price
      const mPrice = document.getElementById(`miniPrice_${idx}`);
      const mChg   = document.getElementById(`miniChg_${idx}`);
      if(mPrice){ mPrice.textContent = price.toFixed(dp); }
      if(mChg){
        mChg.textContent = (up?"▲":"▼")+" "+Math.abs(chg)+"%";
        mChg.className   = "chart-card-chg "+(up?"up":"dn");
      }

      // Update hero if this is selected pair
      if(idx===selectedIdx){
        const hPrice = document.getElementById("heroPrice");
        const hChg   = document.getElementById("heroChg");
        if(hPrice){ hPrice.textContent = price.toFixed(dp); }
        if(hChg){
          hChg.textContent = (up?"▲":"▼")+" "+Math.abs(chg)+"%";
          hChg.className   = "chart-hero-chg "+(up?"up":"dn");
        }
      }
    }
  };
  ws.onclose = ()=> setTimeout(connectPriceWs, 5000);
}

// INIT
buildTabs();
buildHeroChart();
buildAllCharts();
connectPriceWs();
</script>
</body>
</html>
