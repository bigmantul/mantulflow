<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Charts — MANTUL FLOW</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #05070f;
    color: #e2e8f0;
    min-height: 100vh;
  }
  
  .header {
    background: rgba(17, 24, 39, 0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(56, 189, 248, 0.15);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  
  .btn-back {
    padding: 8px 16px;
    background: rgba(56, 189, 248, 0.15);
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 8px;
    color: #38bdf8;
    cursor: pointer;
    text-decoration: none;
    font-size: 13px;
    transition: 0.2s;
  }
  
  .btn-back:hover {
    background: rgba(56, 189, 248, 0.3);
  }
  
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    gap: 20px;
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  
  @media (max-width: 768px) {
    .charts-grid {
      grid-template-columns: 1fr;
    }
  }
  
  .chart-card {
    background: rgba(17, 24, 39, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #38bdf8;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .live-dot {
    width: 8px;
    height: 8px;
    background: #10b981;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .tradingview-widget-container {
    height: 400px;
    width: 100%;
  }
</style>
<!-- TradingView Widget BEGIN -->
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="header">
  <h1>📈 LIVE MARKET CHARTS</h1>
  <a href="/dashboard" class="btn-back">← Back to Dashboard</a>
</div>

<div class="charts-grid" id="chartsGrid"></div>

<script>
const SYMBOLS = [
  { name: "EUR/USD", symbol: "FX:EURUSD" },
  { name: "GBP/USD", symbol: "FX:GBPUSD" },
  { name: "USD/JPY", symbol: "FX:USDJPY" },
  { name: "USD/CHF", symbol: "FX:USDCHF" },
  { name: "AUD/USD", symbol: "FX:AUDUSD" },
  { name: "USD/CAD", symbol: "FX:USDCAD" },
  { name: "NZD/USD", symbol: "FX:NZDUSD" },
  { name: "GOLD", symbol: "OANDA:XAUUSD" },
  { name: "SILVER", symbol: "OANDA:XAGUSD" },
  { name: "BTC/USD", symbol: "BINANCE:BTCUSDT" },
  { name: "ETH/USD", symbol: "BINANCE:ETHUSDT" }
];

function createChart(container, symbol) {
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": symbol,
    "interval": "15",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#0f172a",
    "enable_publishing": false,
    "allow_symbol_change": true,
    "container_id": container,
    "backgroundColor": "#0f172a",
    "gridColor": "rgba(255, 255, 255, 0.06)",
    "hide_side_toolbar": false,
    "studies": [
      "MASimple@tv-basicstudies",
      "RSI@tv-basicstudies"
    ]
  });
}

// Initialize all charts
const chartsGrid = document.getElementById('chartsGrid');

SYMBOLS.forEach((item, index) => {
  const chartCard = document.createElement('div');
  chartCard.className = 'chart-card';
  chartCard.innerHTML = `
    <div class="chart-title">
      <div class="live-dot"></div>
      ${item.name}
    </div>
    <div class="tradingview-widget-container">
      <div id="chart_${index}"></div>
    </div>
  `;
  chartsGrid.appendChild(chartCard);
  
  // Create TradingView widget
  setTimeout(() => {
    createChart(`chart_${index}`, item.symbol);
  }, index * 100);
});
</script>

</body>
</html>
