<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MANTUL'S UNIFIED TRADING BOT FOR DERIV</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .container{width:100%;max-width:440px;padding:24px}
  .logo{text-align:center;margin-bottom:32px}
  .logo h1{font-size:28px;font-weight:700;color:#38bdf8}
  .logo p{color:#64748b;font-size:14px;margin-top:4px}
  .card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:32px}
  .tabs{display:flex;margin-bottom:24px;background:#0f172a;border-radius:8px;padding:4px}
  .tab{flex:1;padding:8px;text-align:center;cursor:pointer;border-radius:6px;font-size:14px;font-weight:500;color:#64748b;transition:.2s}
  .tab.active{background:#1e40af;color:#fff}
  .form-group{margin-bottom:16px}
  label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
  input,select{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;transition:.2s}
  input:focus,select:focus{border-color:#38bdf8}
  .btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
  .btn-primary{background:#1e40af;color:#fff}
  .btn-primary:hover{background:#1d4ed8}
  .error{color:#f87171;font-size:13px;margin-top:8px;display:none}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#334155;font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e293b}
  .section-title{font-size:12px;color:#475569;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>⚡ MANTUL'S UNIFIED TRADING BOT FOR DERIV</h1>
    <p>Unified Smart Money Concepts Trading Platform</p>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Login</div>
      <div class="tab" onclick="showTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••"/>
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn btn-primary" onclick="login()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="MANTUL"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min 6 characters"/>
      </div>

      <div class="divider">Deriv Account</div>

      <div class="form-group">
        <label>Deriv PAT Token</label>
        <input type="text" id="signupPAT" placeholder="pat_xxxxxxxxxxxxxxxx"/>
      </div>
      <div class="form-group">
        <label>Deriv App ID</label>
        <input type="text" id="signupAppId" placeholder="33kDvVzcElBmdV0wfzTy1"/>
      </div>
      <div class="form-group">
        <label>Trading Mode</label>
        <select id="signupMode">
          <option value="demo">Demo (Virtual Money)</option>
          <option value="real">Real (Live Trading)</option>
        </select>
      </div>

      <div class="divider">Telegram (Optional)</div>

      <div class="form-group">
        <label>Telegram Chat ID</label>
        <input type="text" id="signupChatId" placeholder="123456789 — get from @userinfobot"/>
      </div>

      <div class="error" id="signupError"></div>
      <button class="btn btn-primary" onclick="signup()">Create Account</button>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("token")) window.location.href = "/dashboard.html";

  function showTab(tab) {
    document.getElementById("loginForm").style.display   = tab === "login"  ? "block" : "none";
    document.getElementById("signupForm").style.display  = tab === "signup" ? "block" : "none";
    document.querySelectorAll(".tab").forEach((t,i) => {
      t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "signup" && i === 1));
    });
  }

  async function login() {
    const email    = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errEl    = document.getElementById("loginError");
    errEl.style.display = "none";

    if (!email || !password) { errEl.textContent = "Fill in all fields"; errEl.style.display = "block"; return; }

    try {
      const res  = await fetch("/api/auth/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = "block"; return; }
      localStorage.setItem("token", data.token);
      localStorage.setItem("user",  JSON.stringify(data.user));
      window.location.href = "/dashboard.html";
    } catch (e) {
      errEl.textContent = "Network error"; errEl.style.display = "block";
    }
  }

  async function signup() {
    const name       = document.getElementById("signupName").value.trim();
    const email      = document.getElementById("signupEmail").value.trim();
    const password   = document.getElementById("signupPassword").value;
    const derivPAT   = document.getElementById("signupPAT").value.trim();
    const derivAppId = document.getElementById("signupAppId").value.trim();
    const derivMode  = document.getElementById("signupMode").value;
    const chatId     = document.getElementById("signupChatId").value.trim();
    const errEl      = document.getElementById("signupError");
    errEl.style.display = "none";

    if (!name || !email || !password || !derivPAT || !derivAppId) {
      errEl.textContent = "Fill in all required fields"; errEl.style.display = "block"; return;
    }
    if (password.length < 6) {
      errEl.textContent = "Password must be at least 6 characters"; errEl.style.display = "block"; return;
    }

    try {
      const res  = await fetch("/api/auth/signup", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, derivPAT, derivAppId, derivMode, telegramChatId: chatId }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = "block"; return; }
      localStorage.setItem("token", data.token);
      localStorage.setItem("user",  JSON.stringify(data.user));
      window.location.href = "/dashboard.html";
    } catch (e) {
      errEl.textContent = "Network error"; errEl.style.display = "block";
    }
  }
</script>
</body>
</html>
