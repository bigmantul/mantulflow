<script>
// ============================================
// CONFIGURATION
// ============================================
const token = localStorage.getItem("token");
if (!token) window.location.href = "/";

const API = async (path, method = "GET", body = null) => {
  const opts = {
    method,
    headers: {
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json"
    }
  };
  if (body) opts.body = JSON.stringify(body);
  
  const res = await fetch("/api" + path, opts);
  const data = await res.json();
  
  if (res.status === 401) {
    localStorage.clear();
    window.location.href = "/";
  }
  
  return data;
};

// ============================================
// GLOBAL STATE
// ============================================
let equityChart = null;
let currentTradeFilter = "all";
let currentTimeframe = "all";
let botActive = false;
let logsVisible = false;

// ============================================
// UTILITY FUNCTIONS
// ============================================
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(text) {
  return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ============================================
// FETCH REAL BALANCE FROM DERIV
// ============================================
async function refreshBalance() {
  try {
    document.getElementById("balanceAmount").textContent = "$ Loading...";
    const balanceData = await API("/user/balance");
    
    if (balanceData.error) {
      showToast(balanceData.error, 'error');
      document.getElementById("balanceAmount").textContent = "$0.00";
      return;
    }
    
    document.getElementById("balanceAmount").textContent = `$${balanceData.balance.toFixed(2)}`;
    
    // Calculate health score (simple metric: balance/100, capped at 95%)
    const health = Math.min(95, Math.max(40, Math.floor(balanceData.balance / 100)));
    document.getElementById("healthFill").style.width = `${health}%`;
    document.getElementById("healthPercent").textContent = `${health}%`;
    
    showToast(`Balance updated: $${balanceData.balance.toFixed(2)}`, 'success');
  } catch (e) {
    showToast('Failed to fetch balance', 'error');
    console.error(e);
  }
}

// ============================================
// LOAD STATS WITH TIMEFRAME FILTER
// ============================================
async function loadStats(timeframe = "all") {
  try {
    currentTimeframe = timeframe;
    const url = timeframe === "all" ? "/trades/stats" : `/trades/stats?timeframe=${timeframe}`;
    const stats = await API(url);
    
    document.getElementById("statWinRate").textContent = stats.winRate + "%";
    
    const pnlEl = document.getElementById("statTotalPnl");
    pnlEl.textContent = (parseFloat(stats.totalPnl) >= 0 ? "+" : "") + "$" + stats.totalPnl;
    pnlEl.className = "stat-value " + (parseFloat(stats.totalPnl) >= 0 ? "green" : "red");
    
    const todayEl = document.getElementById("statTodayPnl");
    todayEl.textContent = (parseFloat(stats.todayPnl) >= 0 ? "+" : "") + "$" + stats.todayPnl;
    todayEl.className = "stat-value " + (parseFloat(stats.todayPnl) >= 0 ? "green" : "red");
    
    document.getElementById("statTotal").textContent = stats.total;
    document.getElementById("statOpen").textContent = stats.open;
    
    await updateAIPanelFromStats(stats);
  } catch (e) {
    console.error("Stats error:", e);
  }
}

// ============================================
// UPDATE AI PANEL FROM REAL DATA
// ============================================
async function updateAIPanelFromStats(stats) {
  const winRate = parseFloat(stats.winRate) || 0;
  const totalPnl = parseFloat(stats.totalPnl) || 0;
  const openTrades = stats.open || 0;
  
  // AI metrics based on real performance
  const scanningMarkets = 12;
  const trendMatches = Math.min(12, Math.max(1, Math.floor(winRate / 10)));
  const potentialEntries = Math.min(5, Math.max(0, Math.floor((100 - winRate) / 20)));
  const confidence = Math.min(95, Math.max(50, Math.floor(winRate + (totalPnl > 0 ? 10 : -10))));
  
  document.getElementById('scanningMarkets').textContent = scanningMarkets;
  document.getElementById('trendMatches').textContent = trendMatches;
  document.getElementById('potentialEntries').textContent = potentialEntries;
  document.getElementById('confidenceValue').textContent = confidence + '%';
  document.getElementById('confidenceFill').style.width = confidence + '%';
  document.getElementById('gaugeConfidence').textContent = confidence;
  document.getElementById('gaugeFill').style.width = confidence + '%';
  
  // Risk exposure
  const maxOpen = 5;
  const riskExposure = Math.min(95, Math.floor((openTrades / maxOpen) * 100));
  document.getElementById('riskPercent').textContent = riskExposure + '%';
  document.getElementById('riskFill').style.width = riskExposure + '%';
  
  let riskLevel = '🟢 Low Risk';
  if (riskExposure > 70) riskLevel = '🔴 High Risk';
  else if (riskExposure > 40) riskLevel = '⚠️ Moderate Risk';
  document.getElementById('riskLevel').innerHTML = riskLevel;
  
  // Best trade
  const trades = await API("/trades?limit=100");
  if (trades.trades && trades.trades.length > 0) {
    const bestTrade = Math.max(...trades.trades.map(t => t.pnl || 0), 0);
    document.getElementById('bestTrade').innerHTML = `+$${bestTrade.toFixed(2)}`;
    
    // Win streak
    let streak = 0;
    for (const trade of trades.trades.reverse()) {
      if (trade.pnl > 0) streak++;
      else if (trade.pnl < 0) break;
    }
    document.getElementById('winStreak').textContent = streak;
    
    // Monthly return
    const user = await API("/user/me");
    const startBalance = user.balance || 10000;
    const monthlyReturn = ((totalPnl / startBalance) * 100).toFixed(1);
    document.getElementById('monthlyReturn').innerHTML = (monthlyReturn >= 0 ? '+' : '') + monthlyReturn + '%';
  }
}

// ============================================
// LOAD TRADES WITH FILTERS
// ============================================
async function loadTrades(status = "all", timeframe = "all", btnEl = null) {
  try {
    currentTradeFilter = status;
    currentTimeframe = timeframe;
    
    if (btnEl) {
      document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
      btnEl.classList.add("active");
    }
    
    let url = "/trades?limit=100";
    if (status !== "all") url += `&status=${status}`;
    if (timeframe !== "all") url += `&timeframe=${timeframe}`;
    
    const data = await API(url);
    const table = document.getElementById("tradesTable");
    
    if (!data.trades || data.trades.length === 0) {
      table.innerHTML = '<div class="empty">No trades found for this filter</div>';
      return;
    }
    
    const rows = data.trades.map(t => {
      const dir = t.direction === "MULTUP" ? "BUY" : "SELL";
      const dirClass = dir === "BUY" ? "buy" : "sell";
      const pnl = t.pnl !== 0
        ? (t.pnl > 0
            ? `<span style="color:#34d399">+$${t.pnl.toFixed(2)}</span>`
            : `<span style="color:#f87171">-$${Math.abs(t.pnl).toFixed(2)}</span>`)
        : "—";
      const date = new Date(t.openedAt).toLocaleString();
      
      return `<tr>
        <td>${t.symbol}</td>
        <td><span class="badge ${dirClass}">${dir}</span></td>
        <td>$${t.stake.toFixed(2)}</td>
        <td>x${t.multiplier}</td>
        <td>${pnl}</td>
        <td><span class="badge ${t.status}">${t.status}</span></td>
        <td style="color:#475569">${date}</td>
      </tr>`;
    }).join("");
    
    table.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Direction</th>
            <th>Stake</th>
            <th>Multiplier</th>
            <th>PnL</th>
            <th>Status</th>
            <th>Opened</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
    
    // Update stats for current timeframe
    await loadStats(timeframe);
    
  } catch (e) {
    console.error("Load trades error:", e);
  }
}

// ============================================
// UPDATE EQUITY CHART
// ============================================
async function updateEquityChart() {
  try {
    const trades = await API("/trades?limit=200");
    
    if (!trades.trades || trades.trades.length === 0) {
      return;
    }
    
    const user = await API("/user/me");
    let runningBalance = user.balance || 10000;
    const balanceOverTime = [{ date: new Date(Date.now() - 30*24*60*60*1000), balance: runningBalance }];
    const dailyPnL = {};
    
    const sortedTrades = [...trades.trades].sort((a,b) => new Date(a.openedAt) - new Date(b.openedAt));
    
    for (const trade of sortedTrades) {
      if (trade.status !== "open") {
        runningBalance += trade.pnl || 0;
        balanceOverTime.push({ date: new Date(trade.openedAt), balance: runningBalance });
        
        const dateKey = new Date(trade.openedAt).toDateString();
        dailyPnL[dateKey] = (dailyPnL[dateKey] || 0) + (trade.pnl || 0);
      }
    }
    
    const last7Days = [];
    const last7Balances = [];
    const last7PnL = [];
    
    for (let i = 6; i >= 0; i--) {
      const date = new Date();
      date.setDate(date.getDate() - i);
      const dateKey = date.toDateString();
      
      last7Days.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
      
      const closestBalance = balanceOverTime.filter(b => b.date <= date).pop();
      last7Balances.push(closestBalance ? closestBalance.balance : user.balance);
      
      last7PnL.push(dailyPnL[dateKey] || 0);
    }
    
    if (equityChart) equityChart.destroy();
    
    const ctx = document.getElementById('equityChart').getContext('2d');
    equityChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: last7Days,
        datasets: [
          {
            label: 'Account Growth (Real)',
            data: last7Balances,
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56, 189, 248, 0.1)',
            tension: 0.4,
            fill: true,
            borderWidth: 2
          },
          {
            label: 'Daily PnL',
            data: last7PnL,
            borderColor: '#10b981',
            backgroundColor: 'transparent',
            tension: 0.4,
            fill: false,
            borderWidth: 2,
            yAxisID: 'y1'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: { color: '#94a3b8' }
          }
        },
        scales: {
          y: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#94a3b8' }
          },
          y1: {
            position: 'right',
            grid: { drawOnChartArea: false },
            ticks: { color: '#10b981' }
          },
          x: {
            ticks: { color: '#94a3b8' }
          }
        }
      }
    });
  } catch (e) {
    console.error("Chart error:", e);
  }
}

// ============================================
// BOT CONTROL
// ============================================
function updateBotUI(active) {
  const dot = document.getElementById("botDot");
  const lbl = document.getElementById("botLabel");
  const sub = document.getElementById("botSub");
  const btn = document.getElementById("toggleBtn");
  
  dot.style.background = active ? "#34d399" : "#334155";
  lbl.textContent = active ? "Running" : "Stopped";
  sub.textContent = active ? "Bot is scanning markets" : "Click Start to begin";
  btn.textContent = active ? "Stop" : "Start";
  btn.style.background = active ? "rgba(248,113,113,0.8)" : "rgba(16,185,129,0.8)";
  btn.style.color = "white";
}

async function toggleBot() {
  try {
    const newState = !botActive;
    const btn = document.getElementById("toggleBtn");
    btn.disabled = true;
    
    const res = await API("/user/bot", "PUT", { active: newState });
    botActive = res.botActive;
    updateBotUI(botActive);
    
    btn.disabled = false;
    showToast(`Bot ${botActive ? 'started' : 'stopped'} successfully`, 'success');
    
    await loadStats();
    
    // Add to timeline
    const timeline = document.getElementById("timelineList");
    const time = new Date().toLocaleTimeString();
    timeline.insertAdjacentHTML('afterbegin',
      `<div class="timeline-item">
        <span class="timeline-time">${time}</span>
        <span class="timeline-text">Bot ${botActive ? 'Started' : 'Stopped'}</span>
      </div>`
    );
  } catch (e) {
    showToast('Failed to toggle bot', 'error');
    console.error(e);
  }
}

// ============================================
// SYNC & IMPORT TRADES
// ============================================
async function syncTrades() {
  try {
    showToast('Syncing trades...', 'success');
    const data = await API("/user/sync-trades", "POST");
    showToast(data.message || "Trades synced!", 'success');
    
    await loadStats(currentTimeframe);
    await loadTrades(currentTradeFilter, currentTimeframe);
    await updateEquityChart();
  } catch (e) {
    showToast("Sync failed: " + e.message, 'error');
  }
}

async function importTrades() {
  try {
    showToast('Importing all trades from Deriv...', 'success');
    const data = await API("/user/import-trades", "POST");
    showToast(data.message || "Trades imported!", 'success');
    
    await loadStats(currentTimeframe);
    await loadTrades(currentTradeFilter, currentTimeframe);
    await updateEquityChart();
  } catch (e) {
    showToast("Import failed: " + e.message, 'error');
  }
}

// ============================================
// SETTINGS
// ============================================
async function saveRisk() {
  try {
    const data = {
      riskPct: parseFloat(document.getElementById("riskPct").value) / 100,
      maxOpenTrades: parseInt(document.getElementById("maxOpen").value),
      stopLossPct: parseFloat(document.getElementById("stopLoss").value) / 100,
      takeProfitPct: parseFloat(document.getElementById("takeProfit").value) / 100,
    };
    
    await API("/user/risk", "PUT", data);
    showToast("Risk settings saved!", 'success');
  } catch (e) {
    showToast("Failed to save risk settings", 'error');
  }
}

async function saveSettings() {
  try {
    const data = {
      derivPAT: document.getElementById("settingsPAT").value.trim(),
      derivAppId: document.getElementById("settingsAppId").value.trim(),
      derivMode: document.getElementById("settingsMode").value,
      telegramChatId: document.getElementById("settingsChatId").value.trim(),
    };
    
    await API("/user/settings", "PUT", data);
    showToast("Account settings updated!", 'success');
    await refreshBalance();
  } catch (e) {
    showToast("Failed to save settings", 'error');
  }
}

// ============================================
// LOGS
// ============================================
function toggleLogs() {
  logsVisible = !logsVisible;
  document.getElementById("logsCard").style.display = logsVisible ? "block" : "none";
  if (logsVisible) loadLogs();
}

async function loadLogs() {
  try {
    const level = document.getElementById("logLevel").value;
    const container = document.getElementById("logsContainer");
    container.innerHTML = '<span style="color:#475569">Loading...</span>';
    
    const url = level ? `/logs?level=${level}&limit=300` : "/logs?limit=300";
    const logs = await API(url);
    
    if (!logs || !Array.isArray(logs) || !logs.length) {
      container.innerHTML = '<span style="color:#475569">No logs yet. Start your bot to see activity here.</span>';
      return;
    }
    
    const levelColors = {
      trade: "#34d399",
      error: "#f87171",
      warn: "#fbbf24",
      info: "#94a3b8"
    };
    
    container.innerHTML = logs.map(l => {
      const time = new Date(l.createdAt).toLocaleTimeString();
      const date = new Date(l.createdAt).toLocaleDateString();
      const color = levelColors[l.level] || "#94a3b8";
      return `<div class="log-entry" style="color:${color}">
        <span style="color:#334155">[${date} ${time}]</span> ${escapeHtml(l.message)}
      </div>`;
    }).join("");
  } catch (e) {
    document.getElementById("logsContainer").innerHTML =
      `<span style="color:#f87171">Error loading logs: ${e.message}</span>`;
  }
}

// ============================================
// LIVE MARKET PRICES
// ============================================
async function updateMarketPrices() {
  try {
    const prices = await API("/market/prices");
    const container = document.getElementById('marketTickers');
    
    if (!prices || Object.keys(prices).length === 0) {
      container.innerHTML = '<div style="text-align:center;width:100%;color:#475569">Market data unavailable</div>';
      return;
    }
    
    const PAIR_NAMES = {
      "frxEURUSD": "EUR/USD",
      "frxGBPUSD": "GBP/USD",
      "frxUSDJPY": "USD/JPY",
      "frxUSDCHF": "USD/CHF",
      "frxAUDUSD": "AUD/USD",
      "frxUSDCAD": "USD/CAD",
      "frxNZDUSD": "NZD/USD",
      "frxXAUUSD": "GOLD",
      "frxXAGUSD": "SILVER",
      "cryBTCUSD": "BTC/USD",
      "cryETHUSD": "ETH/USD"
    };
    
    let html = '';
    
    for (const [symbol, data] of Object.entries(prices)) {
      const name = PAIR_NAMES[symbol] || symbol;
      const price = data.price?.toFixed(symbol.includes('XAU') || symbol.includes('BTC') || symbol.includes('ETH') ? 2 : 5);
      const change = (Math.random() * 2 - 1).toFixed(2); // Random for demo, replace with real data
      const changeClass = parseFloat(change) >= 0 ? 'up' : 'down';
      const changeSymbol = parseFloat(change) >= 0 ? '▲' : '▼';
      
      html += `
        <div class="market-ticker">
          <div class="ticker-glow ${changeClass}"></div>
          <span class="ticker-symbol">${name}</span>
          <span class="ticker-price">${price || '--'}</span>
          <span class="ticker-change ${changeClass}">${changeSymbol} ${Math.abs(change)}%</span>
        </div>
      `;
    }
    
    container.innerHTML = html;
  } catch (e) {
    console.error("Market prices error:", e);
  }
}

// ============================================
// SESSION INFO
// ============================================
function updateSessionInfo() {
  const hour = new Date().getUTCHours();
  let session = "Off-Hours";
  let volatility = "Low";
  
  if (hour >= 0 && hour < 7) {
    session = "Asian Session";
    volatility = "Low-Medium";
  } else if (hour >= 7 && hour < 12) {
    session = "London Session";
    volatility = "High";
  } else if (hour >= 12 && hour < 16) {
    session = "London/New York Overlap";
    volatility = "Very High";
  } else if (hour >= 16 && hour < 21) {
    session = "New York Session";
    volatility = "Medium-High";
  }
  
  document.getElementById("currentSession").textContent = session;
  document.getElementById("volatility").textContent = volatility;
  document.getElementById("sessionTime").textContent = new Date().toLocaleTimeString();
}

// ============================================
// INITIALIZATION
// ============================================
async function init() {
  try {
    const user = await API("/user/me");
    
    document.getElementById("headerName").textContent = user.name;
    document.getElementById("heroName").innerHTML = user.name.split(' ')[0] + ' 👋';
    
    botActive = user.botActive;
    updateBotUI(botActive);
    
    // Load balance
    await refreshBalance();
    
    // Load risk settings
    const r = user.risk;
    document.getElementById("riskPct").value = Math.round(r.riskPct * 100);
    document.getElementById("maxOpen").value = r.maxOpenTrades;
    document.getElementById("stopLoss").value = Math.round(r.stopLossPct * 100);
    document.getElementById("takeProfit").value = Math.round(r.takeProfitPct * 100);
    
    // Load account settings
    document.getElementById("settingsPAT").value = user.derivPAT || '';
    document.getElementById("settingsAppId").value = user.derivAppId || '';
    document.getElementById("settingsMode").value = user.derivMode || 'demo';
    document.getElementById("settingsChatId").value = user.telegramChatId || '';
    
    // Load data
    await loadStats();
    await loadTrades("all", "all");
    await updateEquityChart();
    await updateMarketPrices();
    updateSessionInfo();
    
    // Session time update
    setInterval(updateSessionInfo, 1000);
    
    // Auto-refresh data every 30 seconds
    setInterval(async () => {
      await loadStats(currentTimeframe);
      await loadTrades(currentTradeFilter, currentTimeframe);
      await updateEquityChart();
      await updateMarketPrices();
    }, 30000);
    
  } catch (e) {
    console.error("Init error:", e);
    showToast("Failed to load dashboard", 'error');
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "/";
}

// Start the dashboard
init();
</script>
